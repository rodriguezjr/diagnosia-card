<!-- templates/diagnosticos/base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnos.IA - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .navbar-brand { font-weight: 700; color: #2563eb !important; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-primary { background: #2563eb; border: none; border-radius: 10px; padding: 10px 20px; }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>
{% block extra_js %}
{% endblock %}
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chatbot' %}">
                <i class="fas fa-heartbeat me-2"></i>Diagnos.IA
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'chatbot' %}">Chatbot</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'protocolos' %}">Protocolos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'estadisticas' %}">Estadísticas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'dashboard_predictivo' %}">IA Predictiva</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white text-center py-3 mt-4 border-top">
        <p class="text-muted mb-0">Diagnos.IA - Sistema Experto en Hipertensión</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
