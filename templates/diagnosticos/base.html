<!-- templates/diagnosticos/base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnos.IA - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .navbar-brand { font-weight: 700; color: #2563eb !important; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-primary { background: #2563eb; border: none; border-radius: 10px; padding: 10px 20px; }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>
{% block extra_js %}
{% endblock %}
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chatbot' %}">
                <i class="fas fa-heartbeat me-2" style="color: var(--primary);"></i>
                Diagnos.IA
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'chatbot' %}active{% endif %}" 
                           href="{% url 'chatbot' %}">
                            <i class="fas fa-robot me-1"></i>Chatbot
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'protocolos' %}active{% endif %}" 
                           href="{% url 'protocolos' %}">
                            <i class="fas fa-book-medical me-1"></i>Protocolos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'estadisticas' %}active{% endif %}" 
                           href="{% url 'estadisticas' %}">
                            <i class="fas fa-chart-bar me-1"></i>Estadísticas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard_predictivo' %}active{% endif %}" 
                           href="{% url 'dashboard_predictivo' %}">
                            <i class="fas fa-brain me-1"></i>IA Predictiva
                        </a>
                    </li>
                    
                    <!-- Separador visual -->
                    <span class="nav-divider"></span>
                    
                    <!-- Botón de Administración (visible solo para usuarios autenticados) -->
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link btn-admin-nav" href="{% url 'admin:index' %}">
                                <i class="fas fa-cog"></i>
                                <span>Administración</span>
                            </a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link btn-admin-nav" href="{% url 'admin:login' %}">
                                <i class="fas fa-lock"></i>
                                <span>Acceder</span>
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white text-center py-3 mt-4 border-top">
        <p class="text-muted mb-0">Diagnos.IA - Sistema Experto en Hipertensión</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
